services:
  # Backend API (Flask + Gunicorn)
  - type: web
    name: projeto-video-ia
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: PROJECT_ID
        sync: false
      - key: LOCATION
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
    healthCheckPath: /
