<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clip Generator</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; width: 90%; max-width: 500px; }
        h1 { font-size: 2.5rem; color: #ff4b2b; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 30px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #bbb; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, #ff4b2b, #ff416c); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        .hidden { display: none; }
        #result video { width: 100%; border-radius: 15px; margin-top: 20px; border: 2px solid #ff4b2b; }
        .loader { border: 4px solid #333; border-top: 4px solid #ff4b2b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-reset { background: #333; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Clip Generator</h1>
        <p>Crie clipes rápidos com a IA do Google Cloud</p>
        <div class="card">
            <div class="input-group">
                <label>O que deve acontecer no clipe?</label>
                <input type="text" id="prompt" placeholder="Ex: Uma onda gigante quebrando em câmera lenta...">
            </div>
            <div class="input-group">
                <label>Duração do clipe:</label>
                <select id="duration">
                    <option value="4">4 Segundos</option>
                    <option value="5">5 Segundos</option>
                    <option value="6">6 Segundos</option>
                    <option value="10">10 Segundos</option>
                </select>
            </div>
            <button onclick="generateVideo()" id="btn">Gerar Clipe</button>
        </div>
        <div id="loading" class="hidden">
            <div class="loader"></div>
            <p>A IA está renderizando seu clipe...</p>
        </div>
        <div id="result" class="hidden">
            <video id="videoPlayer" controls loop></video>
            <br>
            <button onclick="reset()" class="btn-reset">Criar Outro</button>
        </div>
    </div>
    <script>
        async function generateVideo() {
            const prompt = document.getElementById('prompt').value;
            const duration = document.getElementById('duration').value;
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const videoPlayer = document.getElementById('videoPlayer');
            if(!prompt) return alert("Por favor, digite o prompt!");
            btn.disabled = true;
            loading.classList.remove('hidden');
            result.classList.add('hidden');
            try {
                // AQUI VOCÊ TROCARÁ localhost PELA URL DO RENDER DEPOIS
                const response = await fetch('https://projeto-video-ia.onrender.com/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: prompt, duration: duration })
                });
                const data = await response.json();
                if(data.video_url) {
                    videoPlayer.src = `https://projeto-video-ia.onrender.com${data.video_url}`;
                    result.classList.remove('hidden');
                } else { alert("Erro: " + data.error); }
            } catch (e) { alert("Erro ao conectar com o servidor!"); }
            finally { btn.disabled = false; loading.classList.add('hidden'); }
        }
        function reset() {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('prompt').value = '';
        }
    </script>
</body>
</html>
