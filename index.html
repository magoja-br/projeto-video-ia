<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clip Generator – Crie vídeos com IA</title>
    <meta name="description" content="Gere clipes de vídeo incríveis com Inteligência Artificial do Google usando apenas uma descrição de texto.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0a10;
            --surface:   #12121c;
            --surface2:  #1a1a28;
            --border:    #2a2a3a;
            --accent1:   #ff4b2b;
            --accent2:   #ff416c;
            --accent3:   #ff9a6c;
            --text:      #e8e8f0;
            --muted:     #6b6b80;
            --radius:    14px;
            --glow:      rgba(255,75,43,.15);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        /* ── Fundo animado com partículas ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,75,43,.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 80% 90%, rgba(255,65,108,.08) 0%, transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(255,154,108,.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: .7; }
            100% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 540px;
            text-align: center;
        }

        /* ── Header ── */
        .header-icon {
            font-size: 3.2rem;
            margin-bottom: 8px;
            line-height: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4b2b 0%, #ff416c 50%, #ff9a6c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.92rem;
            margin-bottom: 32px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255,75,43,.15), rgba(255,65,108,.15));
            border: 1px solid rgba(255,75,43,.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--accent3);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 24px;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(0,0,0,.6);
            backdrop-filter: blur(10px);
            transition: box-shadow .3s;
        }

        .card:hover {
            box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 40px var(--glow);
        }

        /* ── Inputs ── */
        .input-group { text-align: left; margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 8px;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 13px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: #0d0d16;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s, transform .2s;
        }

        textarea {
            resize: vertical;
            min-height: 180px;
            max-height: 500px;
            line-height: 1.5;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            border-color: var(--accent1);
            box-shadow: 0 0 0 3px rgba(255,75,43,.12);
            transform: translateY(-1px);
        }

        select option { background: #13131a; }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .char-count {
            text-align: right;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── Botão principal ── */
        #btn-gerar {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius);
            border: none;
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: transform .2s, filter .2s, box-shadow .2s;
            box-shadow: 0 8px 24px rgba(255,65,108,.3);
            position: relative;
            overflow: hidden;
        }

        #btn-gerar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
            transform: translateX(-100%);
            transition: transform .6s;
        }

        #btn-gerar:hover:not(:disabled)::before {
            transform: translateX(100%);
        }

        #btn-gerar:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.12);
            box-shadow: 0 12px 36px rgba(255,65,108,.45);
        }

        #btn-gerar:active:not(:disabled) {
            transform: translateY(0);
        }

        #btn-gerar:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        /* ── Loading ── */
        #loading {
            margin-top: 28px;
            animation: fadeIn .4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner-wrap { display: flex; justify-content: center; margin-bottom: 16px; }

        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent1);
            border-right-color: var(--accent2);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #status-msg {
            font-size: 0.92rem;
            color: var(--text);
            margin-bottom: 6px;
            font-weight: 500;
        }

        #elapsed-time {
            font-size: 0.78rem;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .progress-bar {
            width: 100%; height: 8px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4b2b, #ff416c, #ff9a6c);
            background-size: 200% 100%;
            border-radius: 99px;
            transition: width .5s ease;
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #progress-pct {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 6px;
            text-align: right;
        }

        .loading-tip {
            margin-top: 18px;
            padding: 12px 16px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.5;
            animation: fadeIn .5s ease;
        }

        .loading-tip strong {
            color: var(--accent3);
        }

        /* ── Resultado ── */
        #result {
            margin-top: 28px;
            animation: fadeIn .5s ease;
        }

        #result video {
            width: 100%;
            border-radius: var(--radius);
            border: 2px solid var(--accent1);
            box-shadow: 0 0 40px rgba(255,75,43,.2), 0 20px 60px rgba(0,0,0,.5);
        }

        .result-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-secondary {
            padding: 13px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s, color .2s, border-color .2s;
        }

        .btn-secondary:hover {
            background: var(--surface2);
            color: var(--text);
            border-color: var(--accent1);
        }

        .btn-download {
            background: linear-gradient(135deg, rgba(255,75,43,.1), rgba(255,65,108,.1));
            border-color: rgba(255,75,43,.3);
            color: var(--accent3);
        }

        .btn-download:hover {
            background: linear-gradient(135deg, rgba(255,75,43,.2), rgba(255,65,108,.2));
        }

        /* ── Erro ── */
        .error-box {
            margin-top: 20px;
            background: rgba(255,75,43,.08);
            border: 1px solid rgba(255,75,43,.25);
            border-radius: var(--radius);
            padding: 14px 16px;
            font-size: 0.88rem;
            color: #ff8070;
            text-align: left;
            animation: shake .4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* ── Footer ── */
        .footer {
            margin-top: 24px;
            font-size: 0.72rem;
            color: var(--muted);
            opacity: .6;
        }

        .footer a {
            color: var(--accent3);
            text-decoration: none;
        }

        /* ── Utilitários ── */
        .hidden { display: none !important; }

        /* ── Responsividade ── */
        @media (max-width: 480px) {
            body { padding: 16px; }

            h1 { font-size: 1.8rem; }

            .card { padding: 20px; border-radius: 16px; }

            .input-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .result-actions {
                grid-template-columns: 1fr;
            }

            .subtitle { font-size: 0.85rem; margin-bottom: 24px; }
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header-icon">🎬</div>
    <h1>Clip Generator</h1>
    <p class="subtitle">Crie clipes com a IA de vídeo do Google</p>
    <div class="badge">⚡ Powered by Veo 3.1</div>

    <div class="card">
        <div class="input-group">
            <label for="app-password">Senha de Segurança</label>
            <input type="password" id="app-password" placeholder="Digite a senha..." value="" onchange="savePassword()">
        </div>

        <div class="input-group">
            <label for="prompt">Descreva o clipe</label>
            <textarea
                id="prompt"
                placeholder="Ex: Uma onda gigante quebrando em câmera lenta no pôr do sol, cinematográfico, 4K, cores vibrantes..."
                maxlength="2000"
                oninput="updateCharCount()"
            ></textarea>
            <div class="char-count"><span id="char-count">0</span>/2000</div>
        </div>

        <div class="input-group">
            <label for="ref-image">Imagem de Referência (Opcional)</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="file" id="ref-image" accept="image/*" style="display: none;" onchange="previewImage(this)">
                <button type="button" class="btn-secondary" style="width: auto; padding: 8px 16px; margin: 0;" onclick="document.getElementById('ref-image').click()">
                    📁 Escolher Imagem
                </button>
                <span id="file-name" style="font-size: 0.8rem; color: var(--muted);">Nenhuma imagem selecionada</span>
            </div>
            <div id="image-preview-container" class="hidden" style="margin-top: 12px; position: relative; width: fit-content;">
                <img id="image-preview" src="" style="max-width: 100%; max-height: 120px; border-radius: 8px; border: 1px solid var(--border);">
                <button type="button" style="position: absolute; top: -8px; right: -8px; background: var(--accent1); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;" onclick="removerImagem()">✕</button>
            </div>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label for="duration">Duração</label>
                <select id="duration">
                    <option value="4">4 Segundos</option>
                    <option value="5">5 Segundos</option>
                    <option value="6">6 Segundos</option>
                    <option value="8" selected>8 Segundos</option>
                </select>
            </div>

            <div class="input-group">
                <label for="aspect-ratio">Proporção</label>
                <select id="aspect-ratio">
                    <option value="16:9">🖥️ 16:9 Paisagem</option>
                    <option value="9:16">📱 9:16 Retrato</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label for="model">Versão do Modelo (IA)</label>
            <select id="model">
                <option value="veo-3.1-fast-generate-001" selected>⚡ Veo 3.1 Fast (Mais Rápido)</option>
                <option value="veo-3.1-generate-001">✨ Veo 3.1 High Quality (Melhor Qualidade)</option>
            </select>
        </div>

        <button id="btn-gerar" onclick="iniciarGeracao()">✨ Gerar Clipe</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden">
        <div class="spinner-wrap"><div class="spinner"></div></div>
        <p id="status-msg">Iniciando...</p>
        <p id="elapsed-time">Tempo: 0:00</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p id="progress-pct">0%</p>
        <div class="loading-tip" id="loading-tip">
            <strong>💡 Dica:</strong> A geração de vídeo com IA leva em média <strong>2 a 4 minutos</strong>. Fique tranquilo, está processando!
        </div>
    </div>

    <!-- Erro -->
    <div id="error-box" class="error-box hidden"></div>

    <!-- Resultado -->
    <div id="result" class="hidden">
        <video id="video-player" controls loop playsinline></video>
        <div class="result-actions">
            <button class="btn-secondary btn-download" onclick="baixarVideo()">⬇ Download</button>
            <button class="btn-secondary" onclick="resetar()">↩ Criar outro</button>
        </div>
    </div>

    <div class="footer">
        Feito com ❤️ usando <a href="https://deepmind.google/technologies/veo/" target="_blank">Google Veo 3.1</a>
    </div>
</div>

<script>
    const API = 'https://projeto-video-ia.onrender.com';

    let pollingTimer = null;
    let elapsedTimer = null;
    let startTime = null;
    let currentVideoUrl = null;

    // Carrega senha salva
    document.getElementById('app-password').value = localStorage.getItem('app_password') || '';

    function savePassword() {
        const pass = document.getElementById('app-password').value;
        localStorage.setItem('app_password', pass);
    }

    const tips = [
        '💡 <strong>Dica:</strong> A geração de vídeo com IA leva em média <strong>2 a 4 minutos</strong>. Fique tranquilo!',
        '🎨 <strong>Dica:</strong> Quanto mais detalhado o prompt, melhor o resultado. Descreva cores, iluminação e estilo.',
        '🎬 <strong>Dica:</strong> Use termos como "cinematográfico", "4K", "câmera lenta" para vídeos mais impactantes.',
        '🔊 <strong>Dica:</strong> O Veo 3.1 gera <strong>áudio nativo</strong> — sons, música e até diálogos!',
        '📱 <strong>Dica:</strong> Use 9:16 para Reels, TikTok e Shorts. Use 16:9 para YouTube e apresentações.',
        '⚡ <strong>Dica:</strong> O modelo está processando milhões de parâmetros para criar seu vídeo único.',
    ];
    let tipIndex = 0;

    // ── Character counter ─────────────────────────────────────────────────
    function updateCharCount() {
        const count = document.getElementById('prompt').value.length;
        document.getElementById('char-count').textContent = count;
    }

    // ── Image handling ────────────────────────────────────────────────────
    let currentImageBase64 = null;
    let currentImageMime = null;

    function previewImage(input) {
        const file = input.files[0];
        if (!file) return;

        currentImageMime = file.type; // Captura o tipo (ex: image/jpeg)
        document.getElementById('file-name').textContent = file.name;

        const reader = new FileReader();
        reader.onload = function(e) {
            currentImageBase64 = e.target.result.split(',')[1]; // Apenas a parte base64
            document.getElementById('image-preview').src = e.target.result;
            document.getElementById('image-preview-container').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }

    function removerImagem() {
        currentImageBase64 = null;
        currentImageMime = null;
        document.getElementById('ref-image').value = '';
        document.getElementById('file-name').textContent = 'Nenhuma imagem selecionada';
        document.getElementById('image-preview-container').classList.add('hidden');
    }

    // ── Elapsed time ──────────────────────────────────────────────────────
    function startElapsedTimer() {
        startTime = Date.now();
        elapsedTimer = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = String(elapsed % 60).padStart(2, '0');
            document.getElementById('elapsed-time').textContent = `Tempo: ${mins}:${secs}`;
        }, 1000);
    }

    function stopElapsedTimer() {
        clearInterval(elapsedTimer);
    }

    // ── Rotate tips ───────────────────────────────────────────────────────
    function rotateTips() {
        return setInterval(() => {
            tipIndex = (tipIndex + 1) % tips.length;
            const tipEl = document.getElementById('loading-tip');
            tipEl.style.opacity = '0';
            setTimeout(() => {
                tipEl.innerHTML = tips[tipIndex];
                tipEl.style.opacity = '1';
            }, 300);
        }, 8000);
    }

    // ── Helpers de UI ─────────────────────────────────────────────────────
    function setProgress(pct, msg) {
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-pct').textContent = Math.floor(pct) + '%';
        if (msg) document.getElementById('status-msg').textContent = msg;
    }

    function mostrarErro(msg) {
        const box = document.getElementById('error-box');
        box.textContent = '❌ ' + msg;
        box.classList.remove('hidden');
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('btn-gerar').disabled = false;
        stopElapsedTimer();
    }

    function resetar() {
        document.getElementById('result').classList.add('hidden');
        document.getElementById('error-box').classList.add('hidden');
        document.getElementById('prompt').value = '';
        document.getElementById('char-count').textContent = '0';
        document.getElementById('btn-gerar').disabled = false;
        currentVideoUrl = null;
        removerImagem(); // Limpa a imagem de referência
    }

    // ── Download ──────────────────────────────────────────────────────────
    function baixarVideo() {
        if (!currentVideoUrl) return;
        const a = document.createElement('a');
        a.href = currentVideoUrl;
        a.download = 'clip-ia.mp4';
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // ── Início ────────────────────────────────────────────────────────────
    async function iniciarGeracao() {
        const prompt      = document.getElementById('prompt').value.trim();
        const duration    = document.getElementById('duration').value;
        const aspectRatio = document.getElementById('aspect-ratio').value;
        const password    = document.getElementById('app-password').value;
        const model       = document.getElementById('model').value;

        if (!password) {
            alert('Por favor, insira a senha de segurança!');
            return;
        }

        if (!prompt) {
            alert('Por favor, descreva o clipe antes de gerar!');
            return;
        }

        // Reset visual
        document.getElementById('btn-gerar').disabled = true;
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
        document.getElementById('error-box').classList.add('hidden');
        setProgress(3, 'Acordando o servidor...');
        startElapsedTimer();

        const tipTimer = rotateTips();

        // Tenta conectar com retry (Render free tier pode demorar ~30s para acordar)
        let res, data;
        for (let attempt = 1; attempt <= 3; attempt++) {
            try {
                setProgress(3 + attempt * 2, attempt > 1
                    ? `Reconectando... (tentativa ${attempt}/3)`
                    : 'Conectando ao servidor...');

                res = await fetch(`${API}/generate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Password': password
                    },
                    body: JSON.stringify({ 
                        prompt, 
                        duration, 
                        aspect_ratio: aspectRatio,
                        model: model,
                        image: currentImageBase64,
                        mimeType: currentImageMime // Enviando o tipo da imagem
                    }),
                });

                data = await res.json();
                break; // sucesso

            } catch (e) {
                console.warn(`[Tentativa ${attempt}/3] Erro de conexão:`, e);
                if (attempt === 3) {
                    clearInterval(tipTimer);
                    mostrarErro('Não foi possível conectar ao servidor. O backend pode estar offline. Tente novamente em 30 segundos.');
                    return;
                }
                // Aguarda antes de tentar novamente
                await new Promise(r => setTimeout(r, 5000));
            }
        }

        if (!res.ok || data.error) {
            clearInterval(tipTimer);
            mostrarErro(data.error || 'Erro ao iniciar a geração.');
            return;
        }

        // Começa polling
        setProgress(10, 'Solicitação enviada! Aguardando IA...');
        aguardarJob(data.job_id, tipTimer, password);
    }

    // ── Polling ───────────────────────────────────────────────────────────
    let pollErrorCount = 0;
    const MAX_POLL_ERRORS = 5;

    function aguardarJob(jobId, tipTimer, password) {
        pollErrorCount = 0;

        pollingTimer = setInterval(async () => {
            try {
                const res  = await fetch(`${API}/status/${jobId}`, {
                    headers: { 'X-Password': password }
                });
                const data = await res.json();
                pollErrorCount = 0; // reset on success

                if (data.status === 'done') {
                    clearInterval(pollingTimer);
                    clearInterval(tipTimer);
                    stopElapsedTimer();
                    setProgress(100, '🎉 Concluído!');

                    setTimeout(() => {
                        document.getElementById('loading').classList.add('hidden');
                        const player = document.getElementById('video-player');
                        currentVideoUrl = `${API}${data.video_url}?password=${encodeURIComponent(password)}`;
                        player.src = currentVideoUrl;
                        document.getElementById('result').classList.remove('hidden');
                    }, 600);

                } else if (data.status === 'error') {
                    clearInterval(pollingTimer);
                    clearInterval(tipTimer);
                    mostrarErro(data.error || 'Ocorreu um erro na geração.');

                } else {
                    // processing | queued
                    setProgress(data.progress || 10, data.message || 'Processando...');
                }

            } catch (e) {
                pollErrorCount++;
                console.warn(`[Polling] Erro ${pollErrorCount}/${MAX_POLL_ERRORS}:`, e);

                if (pollErrorCount >= MAX_POLL_ERRORS) {
                    clearInterval(pollingTimer);
                    clearInterval(tipTimer);
                    mostrarErro('Perda de conexão ao verificar o status do job. Verifique sua internet e tente novamente.');
                } else {
                    // Mostra feedback visual mas continua tentando
                    document.getElementById('status-msg').textContent = `Reconectando... (${pollErrorCount}/${MAX_POLL_ERRORS})`;
                }
            }
        }, 3000); // verifica a cada 3 segundos
    }
</script>
</body>
</html>
