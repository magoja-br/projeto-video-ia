<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clip Generator – Crie vídeos com IA</title>
    <meta name="description" content="Gere clipes de vídeo incríveis com Inteligência Artificial do Google usando apenas uma descrição de texto.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0b0b0f;
            --surface:   #13131a;
            --border:    #2a2a3a;
            --accent1:   #ff4b2b;
            --accent2:   #ff416c;
            --text:      #e8e8f0;
            --muted:     #6b6b80;
            --radius:    14px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Fundo animado ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,75,43,.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 80% 90%, rgba(255,65,108,.10) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        /* ── Header ── */
        .header-icon { font-size: 3rem; margin-bottom: 8px; line-height: 1; }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4b2b 0%, #ff416c 50%, #ff9a6c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(0,0,0,.6);
        }

        /* ── Inputs ── */
        .input-group { text-align: left; margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 8px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 13px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: #0f0f18;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent1);
            box-shadow: 0 0 0 3px rgba(255,75,43,.15);
        }

        select option { background: #13131a; }

        /* ── Botão principal ── */
        #btn-gerar {
            width: 100%;
            padding: 15px;
            border-radius: var(--radius);
            border: none;
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: #fff;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform .2s, filter .2s, box-shadow .2s;
            box-shadow: 0 8px 24px rgba(255,65,108,.3);
        }

        #btn-gerar:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.12);
            box-shadow: 0 12px 30px rgba(255,65,108,.45);
        }

        #btn-gerar:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        /* ── Loading ── */
        #loading { margin-top: 28px; }

        .spinner-wrap { display: flex; justify-content: center; margin-bottom: 16px; }

        .spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--accent1);
            border-radius: 50%;
            animation: spin .9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #status-msg {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%; height: 8px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
            border-radius: 99px;
            transition: width .4s ease;
        }

        #progress-pct {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 6px;
            text-align: right;
        }

        /* ── Resultado ── */
        #result { margin-top: 28px; }

        #result video {
            width: 100%;
            border-radius: var(--radius);
            border: 2px solid var(--accent1);
            box-shadow: 0 0 30px rgba(255,75,43,.25);
        }

        #btn-reset {
            width: 100%;
            margin-top: 16px;
            padding: 13px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background .2s, color .2s;
        }

        #btn-reset:hover { background: var(--border); color: var(--text); }

        /* ── Erro ── */
        .error-box {
            margin-top: 20px;
            background: rgba(255,75,43,.1);
            border: 1px solid rgba(255,75,43,.3);
            border-radius: var(--radius);
            padding: 14px 16px;
            font-size: 0.88rem;
            color: #ff8070;
            text-align: left;
        }

        /* ── Utilitários ── */
        .hidden { display: none !important; }
    </style>
</head>

<body>
<div class="container">
    <div class="header-icon">🎬</div>
    <h1>Clip Generator</h1>
    <p class="subtitle">Crie clipes com a IA de vídeo do Google</p>

    <div class="card">
        <div class="input-group">
            <label for="prompt">Descreva o clipe</label>
            <input
                type="text"
                id="prompt"
                placeholder="Ex: Uma onda gigante em câmera lenta, 4K realista..."
                autocomplete="off"
            >
        </div>

        <div class="input-group">
            <label for="duration">Duração</label>
            <select id="duration">
                <option value="4">4 Segundos</option>
                <option value="5">5 Segundos</option>
                <option value="6">6 Segundos</option>
                <option value="8">8 Segundos</option>
            </select>
        </div>

        <div class="input-group">
            <label for="aspect-ratio">Proporção da tela</label>
            <select id="aspect-ratio">
                <option value="16:9">🖥️ 16:9 — Paisagem (YouTube, TV)</option>
                <option value="9:16">📱 9:16 — Retrato (Reels, TikTok, Shorts)</option>
            </select>
        </div>

        <button id="btn-gerar" onclick="iniciarGeracao()">✨ Gerar Clipe</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden">
        <div class="spinner-wrap"><div class="spinner"></div></div>
        <p id="status-msg">Iniciando...</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p id="progress-pct">0%</p>
    </div>

    <!-- Erro -->
    <div id="error-box" class="error-box hidden"></div>

    <!-- Resultado -->
    <div id="result" class="hidden">
        <video id="video-player" controls loop playsinline></video>
        <button id="btn-reset" onclick="resetar()">↩ Criar outro clipe</button>
    </div>
</div>

<script>
    const API = 'https://projeto-video-ia.onrender.com';

    let pollingTimer = null;

    // ── Helpers de UI ──────────────────────────────────────────────────────
    function setProgress(pct, msg) {
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-pct').textContent = Math.floor(pct) + '%';
        if (msg) document.getElementById('status-msg').textContent = msg;
    }

    function mostrarErro(msg) {
        const box = document.getElementById('error-box');
        box.textContent = '❌ ' + msg;
        box.classList.remove('hidden');
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('btn-gerar').disabled = false;
    }

    function resetar() {
        document.getElementById('result').classList.add('hidden');
        document.getElementById('error-box').classList.add('hidden');
        document.getElementById('prompt').value = '';
        document.getElementById('btn-gerar').disabled = false;
    }

    // ── Início ─────────────────────────────────────────────────────────────
    async function iniciarGeracao() {
        const prompt      = document.getElementById('prompt').value.trim();
        const duration    = document.getElementById('duration').value;
        const aspectRatio = document.getElementById('aspect-ratio').value;

        if (!prompt) {
            alert('Por favor, descreva o clipe antes de gerar!');
            return;
        }

        // Reset visual
        document.getElementById('btn-gerar').disabled = true;
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('result').classList.add('hidden');
        document.getElementById('error-box').classList.add('hidden');
        setProgress(5, 'Conectando ao servidor...');

        try {
            const res = await fetch(`${API}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, duration, aspect_ratio: aspectRatio }),
            });

            const data = await res.json();

            if (!res.ok || data.error) {
                mostrarErro(data.error || 'Erro ao iniciar a geração.');
                return;
            }

            // Começa polling
            setProgress(10, 'Solicitação enviada! Aguardando IA...');
            aguardarJob(data.job_id);

        } catch (e) {
            mostrarErro('Não foi possível conectar ao servidor. Verifique se o backend está online.');
        }
    }

    // ── Polling ────────────────────────────────────────────────────────────
    function aguardarJob(jobId) {
        pollingTimer = setInterval(async () => {
            try {
                const res  = await fetch(`${API}/status/${jobId}`);
                const data = await res.json();

                if (data.status === 'done') {
                    clearInterval(pollingTimer);
                    setProgress(100, 'Concluído!');

                    setTimeout(() => {
                        document.getElementById('loading').classList.add('hidden');
                        const player = document.getElementById('video-player');
                        player.src = `${API}${data.video_url}`;
                        document.getElementById('result').classList.remove('hidden');
                    }, 600);

                } else if (data.status === 'error') {
                    clearInterval(pollingTimer);
                    mostrarErro(data.error || 'Ocorreu um erro na geração.');

                } else {
                    // processing | queued
                    setProgress(data.progress || 10, data.message || 'Processando...');
                }

            } catch (e) {
                clearInterval(pollingTimer);
                mostrarErro('Perda de conexão ao verificar o status do job.');
            }
        }, 4000); // verifica a cada 4 segundos
    }
</script>
</body>
</html>
